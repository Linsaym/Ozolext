<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fc;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      font-weight: 700;
      font-size: 18px;
      color: #005BFF;
    }
    .badge {
      background: #005BFF;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #28a745;
      flex-shrink: 0;
    }
    .dot.inactive {
      background: #dc3545;
    }
    .label {
      font-size: 13px;
      color: #1a1a2e;
    }
    .sub {
      font-size: 12px;
      color: #6c757d;
    }
    .btn-action {
      width: 100%;
      padding: 10px;
      background: #005BFF;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-action:hover {
      background: #0047cc;
    }
    .btn-action:active {
      transform: scale(0.97);
    }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Ozolext</span>
    <span class="badge">v1.0</span>
  </div>

  <div class="status" id="statusBlock">
    <span class="dot" id="statusDot"></span>
    <span>
      <div class="label" id="statusLabel">Ожидание страницы</div>
      <div class="sub" id="statusSub">Откройте сессию выдачи</div>
    </span>
  </div>

  <button class="btn-action" id="triggerBtn">▶ Выдать заказ</button>

  <div class="footer">
    Клик по кнопке эмулирует нажатие «Продолжить / Оплатить»
  </div>

  <script src="popup.js"></script>
</body>
</html>

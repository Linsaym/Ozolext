<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fc;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      font-weight: 700;
      font-size: 18px;
      color: #005BFF;
    }
    .badge {
      background: #005BFF;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c757d;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.active {
      background: #28a745;
    }
    .label {
      font-size: 13px;
      color: #1a1a2e;
    }
    .sub {
      font-size: 12px;
      color: #6c757d;
    }
    .btn-action {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: not-allowed;
      transition: all 0.3s;
      background: #e9ecef;
      color: #adb5bd;
      opacity: 0.7;
    }
    .btn-action.active {
      background: #005BFF;
      color: #fff;
      cursor: pointer;
      opacity: 1;
    }
    .btn-action.active:hover {
      background: #0047cc;
    }
    .btn-action.active:active {
      transform: scale(0.97);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      margin-top: 10px;
    }
    .toggle-label {
      font-size: 13px;
      color: #1a1a2e;
    }
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .slider {
      background: #005BFF;
    }
    .toggle-switch input:checked + .slider::before {
      transform: translateX(18px);
    }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Ozolext</span>
    <span class="badge">v1.6</span>
  </div>

  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span>
      <div class="label" id="statusLabel">⏳ Инициализация...</div>
      <div class="sub" id="statusSub">Ожидание страницы</div>
    </span>
  </div>

  <button class="btn-action" id="triggerBtn" disabled>⏳ Ожидание...</button>

  <div class="toggle-row">
    <span class="toggle-label">Отображение кнопки</span>
    <label class="toggle-switch">
      <input type="checkbox" id="floatingToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Клик по кнопке эмулирует нажатие «Продолжить / Оплатить»
  </div>

  <script src="popup.js"></script>
</body>
</html>
